version: "3.8"

services:
  redmine:
    image: redmine:3.4.11
    container_name: redmine-local
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      REDMINE_DB_POSTGRES: postgres-redmine
      REDMINE_DB_DATABASE: redmine_db
      REDMINE_DB_USERNAME: redmine_user
      REDMINE_DB_PASSWORD: "change_me"
    depends_on:
      - postgres

  postgres:
    image: postgres:10.16
    container_name: postgres-redmine
    restart: unless-stopped
    environment:
      POSTGRES_USER: redmine_user
      POSTGRES_PASSWORD: "change_me"
      POSTGRES_DB: redmine_db

volumes:
  postgres-data:
